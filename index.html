<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Espera - Estudio Jurídico</title>
    <style>
        /* Estilos Generales para Pantalla de TV */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            overflow: hidden;
            position: relative;
        }

        /* Contenedor del Logo */
        .logo-container {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-height: 40%;
        }
        .logo-container img {
            max-height: 300px;
            width: auto;
            object-fit: contain;
        }

        /* Contenedor Principal de Especialidades */
        .content-slider {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
        }
        .specialty {
            font-size: 5.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            position: absolute;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
            color: #000000;
            width: 100%;
        }
        
        .specialty.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Barra Inferior */
        .footer {
            width: 100%;
            border-top: 3px solid #000000;
            padding-top: 20px;
            display: flex;
            justify-content: space-between; /* Espacia la dirección y el video */
            align-items: center;
            height: 190px; /* Espacio fijo para contener el reproductor */
        }
        .address {
            font-size: 2.5rem;
            font-weight: bold;
            color: #000000;
            flex: 1;
            text-align: left; /* Alineado a la izquierda para balancear con el video */
            padding-left: 20px;
        }
        
        /* Contenedor del Reproductor de YouTube Visible */
        .video-container {
            width: 300px;
            height: 170px;
            border: 2px solid #000000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        #player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- 1. LOGO -->
    <div class="logo-container">
        <img src="logobgpo.jpeg" alt="Logo Estudio Jurídico">
    </div>

    <!-- 2. ROTADOR DE ESPECIALIDADES -->
    <div class="content-slider">
        <div class="specialty active">Familia</div>
        <div class="specialty">Amparos de Salud</div>
        <div class="specialty">Civil</div>
        <div class="specialty">Laboral</div>
    </div>

    <!-- 3. BARRA INFERIOR CON VIDEO INTEGRADO -->
    <div class="footer">
        <div class="address">27 de Abril 627 - Oficina A</div>
        
        <!-- El reproductor oficial ahora es visible abajo a la derecha -->
        <div class="video-container">
            <div id="player"></div>
        </div>
    </div>

    <script>
        // --- LÓGICA DEL ROTADOR ---
        const specialties = document.querySelectorAll('.specialty');
        let currentIndex = 0;

        function rotateSpecialties() {
            specialties[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % specialties.length;
            specialties[currentIndex].classList.add('active');
        }
        setInterval(rotateSpecialties, 5000);

        // --- LÓGICA DE YOUTUBE API ---
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'Bk471uQ26-4', // Cadena 3 En Vivo
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,       // Muestra controles por si querés pausar o ajustar volumen
                    'modestbranding': 1,
                    'rel': 0
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // Intenta reproducir automáticamente
            event.target.playVideo();
            
            // "Plan B" obligatorio de Chrome/Chromecast: Al hacer UN CLIC en cualquier 
            // parte blanca del fondo de la pantalla, el audio se activa inmediatamente.
            document.body.addEventListener('click', function() {
                if (player && typeof player.playVideo === 'function') {
                    player.playVideo();
                }
            }, { once: true });
        }
    </script>
</body>
</html>
